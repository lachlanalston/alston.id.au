<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --surface: #f0f0f0;
      --text: #1c1c1c;
      --text-mid: #4a4a4a;
      --text-muted: #777;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.15);
      --code-bg: #f0f0f0;
      --table-stripe: rgba(0, 0, 0, 0.025);
      --tag-bg: #e8e8e8;
      --tag-text: #555;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --surface: #1a1a1a;
        --text: #e0e0e0;
        --text-mid: #aaa;
        --text-muted: #666;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --border: rgba(255, 255, 255, 0.06);
        --border-strong: rgba(255, 255, 255, 0.12);
        --code-bg: #1e1e1e;
        --table-stripe: rgba(255, 255, 255, 0.02);
        --tag-bg: #252525;
        --tag-text: #999;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-strong);
    }

    header .site-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    nav { display: flex; gap: 1.5rem; }

    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      text-transform: lowercase;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent); }

    a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
    a:hover { color: var(--accent-hover); }

    h1 {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.3;
      margin: 0 0 0.5rem;
    }

    h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 2.5rem 0 1rem;
    }

    h3 { font-size: 1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }

    p { margin-bottom: 1rem; color: var(--text-mid); }
    p:last-child { margin-bottom: 0; }

    ul, ol { margin: 0 0 1.2rem 1.2rem; }
    li { margin-bottom: 0.4rem; color: var(--text-mid); }
    li strong { color: var(--text); font-weight: 500; }

    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--code-bg);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }

    pre {
      background: var(--code-bg);
      padding: 1.2rem;
      overflow-x: auto;
      border-radius: 6px;
      margin-bottom: 1.2rem;
      border: 1px solid var(--border);
    }

    pre code { background: none; padding: 0; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-align: left;
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border-strong);
    }

    td {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-mid);
    }

    tr:nth-child(even) { background: var(--table-stripe); }
    td a { font-weight: 500; }

    blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 1.2rem;
      color: var(--text-muted);
      margin: 0 0 1.2rem;
      font-style: italic;
    }

    strong { font-weight: 600; color: var(--text); }
    em { color: var(--text-muted); }

    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-strong);
      display: flex;
      gap: 1rem;
    }

    footer a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      body { padding: 2rem 1.2rem; }
      header { flex-direction: column; gap: 0.5rem; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.45rem 0.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav>
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}"
           {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <a href="mailto:lachlan@alston.id.au">lachlan@alston.id.au</a>
    <a href="https://github.com/lachlanalston">github</a>
  </footer>
</body>
</html>
